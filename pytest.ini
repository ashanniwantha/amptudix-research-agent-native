[pytest]
# Register our custom markers to avoid warnings
markers =
    needs_llm: marks tests that require a running local Ollama instance (slow/integration)
    memory: marks tests for the ChromaDB vector vault logic

# Default command line arguments
# -v: Verbose output
# -ra: Show extra summary info for all tests except passed
addopts = -v -ra

# Tell pytest where the source code lives
pythonpath = .
testpaths = tests
